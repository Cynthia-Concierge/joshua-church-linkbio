<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Dean Church - Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            display: block;
        }

        .link-item:hover {
            background: #252525;
            border-color: #666;
            transform: translateY(-2px);
        }

        .link-item:active {
            transform: translateY(0);
        }

        .link-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
        }

        .link-subtitle {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
            line-height: 1.3;
        }

        @media (max-width: 480px) {
            .link-item {
                padding: 18px;
            }

            .link-title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Joshua Dean Church</h1>

        <div class="links">
            <a href="https://amzn.to/41hNtwW" class="link-item">
                <div class="link-title">👉 Buy my book on Amazon/Audible</div>
                <div class="link-subtitle">(yes I narrate it!)</div>
            </a>

            <a href="https://www.joshuadeanchurch.com/ftogroup" class="link-item">
                <div class="link-title">👉 Join Find The Others WhatsApp Group</div>
                <div class="link-subtitle">(for a daily message of inspiration/insight/motivation)</div>
            </a>

            <a href="https://www.joshuadeanchurch.com/find-the-others-podcast" class="link-item">
                <div class="link-title">👉 Listen to Find The Others Podcast</div>
                <div class="link-subtitle">(Spotify, YouTube, Apple)</div>
            </a>

            <a href="https://www.joshuadeanchurch.com/book-joshua-church" class="link-item">
                <div class="link-title">👉 Learn about my Founder Consulting</div>
                <div class="link-subtitle">(and how I can help your biz)</div>
            </a>
        </div>
    </div>
</body>
</html>
